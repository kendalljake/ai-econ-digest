name: Daily AI Econ Digest

on:
  schedule:
    - cron: "30 6 * * *"
  workflow_dispatch: {}

jobs:
  run-digest:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run digest
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_MODEL: ${{ secrets.LLM_MODEL }}
          IMAP_HOST: ${{ secrets.IMAP_HOST }}
          IMAP_USER: ${{ secrets.IMAP_USER }}
          IMAP_APP_PASSWORD: ${{ secrets.IMAP_APP_PASSWORD }}
        run: |
          python daily_digest.py

      - name: Commit updated state and feeds
        run: |
          git config user.name "ai-digest-bot"
          git config user.email "ai-digest-bot@users.noreply.github.com"
          git add state.sqlite feeds.yaml || true
          git commit -m "Update digest state" || echo "No changes to commit"
          git push || true

